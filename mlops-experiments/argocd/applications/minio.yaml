apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: infra-tools
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: minio
    targetRevision: 14.6.30
    helm:
      releaseName: minio
      values: |
        auth:
          rootUser: admin
          rootPassword: admin12345
        defaultBuckets: "mlflow-artifacts"
        mode: standalone
        service:
          type: ClusterIP
          ports:
            api: 9000
            console: 9001
        persistence:
          enabled: true
          size: 2Gi
        image:
          registry: docker.io
          repository: bitnamilegacy/minio
          tag: 2025.5.24-debian-12-r5

  destination:
    server: https://kubernetes.default.svc
    namespace: application
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
